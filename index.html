<!DOCTYPE html>
<html lang="es">

<style>

text-align:center;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

.producto img{
width:100%;
border-radius:8px;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1ebc59;
}
</style>

</head>
