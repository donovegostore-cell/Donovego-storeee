<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donovego Store</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.producto img{
width:100%;
border-radius:8px;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1ebc59;
}
</style>

</head>

<body>

<header>
<h1>🛍 Donovego Store</h1>
<p>Los mejores productos al mejor precio.</p>
</header>

<div class="productos">

<div class="producto">
<img src="https://via.placeholder.com/300x300" alt="">
<h2>Nombre del producto</h2>
<h3>$50.000</h3>
<p>Aquí irá la descripción del producto.</p>

<button onclick="window.open('https://wa.me/573202125565text=Hola,%20quiero%20comprar%20este%20producto')">
Comprar por WhatsApp
</button>

</div>

</div>

</body>
</html>
